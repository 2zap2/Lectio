name: Update calendar.ics

on:
  workflow_dispatch:
  schedule:
    # 07:05 UTC = 08:05 CET (winter) / 09:05 CEST (summer).
    # A single entry avoids the fragile two-cron + time-gate pattern:
    # GitHub cron jobs can be delayed 30-90+ min, which caused the
    # hour==8 gate to fail silently and skip the sync entirely.
    - cron: "5 7 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Fetch Lectio and build ICS
        env:
          LECTIO_SCHEDULE_URL: ${{ secrets.LECTIO_SCHEDULE_URL }}
          LECTIO_COOKIE_HEADER: ${{ secrets.LECTIO_COOKIE_HEADER }}
          LECTIO_ASSIGNMENTS_URL: ${{ secrets.LECTIO_ASSIGNMENTS_URL }}
        run: |
          # Build optional assignments arguments only when the URL secret is set.
          ASSIGNMENTS_ARGS=()
          if [ -n "$LECTIO_ASSIGNMENTS_URL" ]; then
            ASSIGNMENTS_ARGS=(
              --fetch-assignments
              --assignments-url "$LECTIO_ASSIGNMENTS_URL"
              --assignments-out "docs/assignments.ics"
            )
          else
            echo "LECTIO_ASSIGNMENTS_URL secret is not set – skipping assignments feed."
          fi

          python -m lectio_sync \
            --fetch \
            --schedule-url "$LECTIO_SCHEDULE_URL" \
            --out "docs/calendar.ics" \
            --tz "Europe/Copenhagen" \
            --days-past 7 \
            --days-future 90 \
            --debug-fetch \
            --free-classrooms-out "docs/free_classrooms.ics" \
            "${ASSIGNMENTS_ARGS[@]}"

      - name: Commit and push if changed
        run: |
          git add docs/*.ics
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          stamp=$(date -u "+%Y-%m-%d %H:%M UTC")
          git commit -m "Update calendars ($stamp)"
          git push
